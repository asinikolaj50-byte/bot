name: Run Telegram Bot

# Бот будет запускаться автоматически при каждом пуше в ветку main
on:
  push:
    branches:
      - main
  # Также добавляем кнопку ручного запуска в интерфейсе GitHub
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код репозитория на сервер GitHub
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Устанавливаем Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Устанавливаем библиотеки из requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Запускаем бота и передаем ему секретный токен
    - name: Run Telegram Bot Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python bot.py
